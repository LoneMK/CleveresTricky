name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================================
  # Phase 1: Quality Gate & Linting
  # ============================================================
  quality-gate:
    name: "🛡️ Quality Gate & Linting"
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: "🐚 Shell Script Linting (Shellcheck)"
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck module/template/*.sh || echo "::warning::Shellcheck found issues (suppressed for now to avoid breaking existing code)"

      - name: "🎨 Kotlin Format & Quality (Ktlint)"
        run: ./gradlew ktlintCheck

      - name: "📱 Android Static Analysis (Lint)"
        run: ./gradlew lintDebug

  # ============================================================
  # Phase 2: Rust Tests & Linters
  # ============================================================
  rust-test:
    name: "🦀 Rust Checks & Tests"
    runs-on: ubuntu-latest
    needs: quality-gate
    env:
      RUSTFLAGS: "-D warnings"
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Security Audit
        run: |
          cargo install cargo-audit
          cargo audit

  # ============================================================
  # Phase 2: Build & Release
  # ============================================================
  build:
    name: "🛠️ Build & Release Module"
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: "🔒 SELinux Policy Validation"
        run: |
          echo "=== Checking sepolicy.rule for missing semicolons ==="
          ERRORS=0
          LINE_NUM=0
          while IFS= read -r line; do
            LINE_NUM=$((LINE_NUM + 1))
            trimmed=$(echo "$line" | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
            [ -z "$trimmed" ] && continue
            [[ "$trimmed" == \#* ]] && continue
            [[ "$trimmed" == type\ * ]] && continue

            if echo "$trimmed" | grep -qE '^(allow|dontaudit|neverallow|auditallow) '; then
              statement=$(echo "$trimmed" | sed 's/#.*//' | sed 's/[[:space:]]*$//')
              if [[ "$statement" != *";" ]]; then
                echo "::error file=module/template/sepolicy.rule,line=$LINE_NUM::Missing semicolon: $trimmed"
                ERRORS=$((ERRORS + 1))
              fi
            fi
          done < module/template/sepolicy.rule
          if [ "$ERRORS" -gt 0 ]; then exit 1; fi

      - name: "📱 Magisk Module Structure Validation"
        run: |
          ERRORS=0
          for f in module.prop customize.sh service.sh post-fs-data.sh sepolicy.rule; do
            if [ ! -f "module/template/$f" ]; then
              echo "::error::Missing required module file: module/template/$f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          for script in module/template/action.sh module/template/customize.sh module/template/service.sh module/template/post-fs-data.sh; do
            if [ -f "$script" ]; then
              if ! bash -n "$script" 2>/dev/null; then
                echo "::error file=$script::Shell syntax error"
                ERRORS=$((ERRORS + 1))
              fi
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then exit 1; fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Run Module Tests
        run: ./gradlew :module:testDebugUnitTest

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest || true

      - name: Print Failed Test Details
        if: always()
        run: |
          echo "=== Searching for failed tests ==="
          find . -path "*/test-results/*" -name "*.xml" -exec grep -l 'failures="[1-9]' {} \; | while read f; do
            echo "=== FAILED TEST FILE: $f ==="
            cat "$f"
          done
          # Also check if there were actual failures
          FAILED=$(find . -path "*/test-results/*" -name "*.xml" -exec grep -l 'failures="[1-9]' {} \;)
          if [ -n "$FAILED" ]; then
            echo "::error::There were failing tests!"
            exit 1
          fi

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/

      - name: Build Android Artifacts
        run: |
          ./gradlew zipRelease
          ./gradlew zipDebug
          ./gradlew :encryptor-app:assembleRelease

      - name: Prepare artifact
        if: success()
        id: prepareArtifact
        run: |
          releasePath=$(ls module/release/*-release.zip)
          releaseName=$(basename "$releasePath" .zip)
          echo "releaseName=$releaseName" >> $GITHUB_OUTPUT

          debugPath=$(ls module/release/*-debug.zip)
          debugName=$(basename "$debugPath" .zip)
          echo "debugName=$debugName" >> $GITHUB_OUTPUT

          unzip "$releasePath" -d module-release
          unzip "$debugPath" -d module-debug

      - name: Upload release zip
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.prepareArtifact.outputs.releaseName }}
          path: "./module-release/*"

      - name: Upload debug zip
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.prepareArtifact.outputs.debugName }}
          path: "./module-debug/*"

      - name: Upload Encryptor App
        uses: actions/upload-artifact@v7
        with:
          name: EncryptorApp
          path: "./encryptor-app/build/outputs/apk/release/*.apk"

      - name: Check for Release Tag
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: check_release
        run: |
          VERSION=$(grep 'val verName by extra' build.gradle.kts | cut -d'"' -f2 | sed 's/^[vV]//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          if git ls-remote --exit-code --tags origin "refs/tags/V$VERSION" >/dev/null 2>&1; then
            echo "create_release=false" >> $GITHUB_OUTPUT
          else
            echo "create_release=true" >> $GITHUB_OUTPUT
          fi

      - name: "📝 Build Changelog"
        if: steps.check_release.outputs.create_release == 'true'
        id: build_changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
              git log --pretty=format:"%s" > raw_commits.txt
          else
              git log ${PREV_TAG}..HEAD --pretty=format:"%s" > raw_commits.txt
          fi
          
          python3 -c '
          import re
          from collections import defaultdict
          
          groups = defaultdict(list)
          for line in open("raw_commits.txt"):
              line = line.strip()
              if not line: continue
              match = re.search(r"^(.*)\s+\(#(\d+)\)$", line)
              if match:
                  msg = match.group(1).strip()
                  num = match.group(2)
                  groups[msg].append(num)
              else:
                  groups[line].append(None)
          
          with open("CHANGELOG.md", "w", encoding="utf-8") as f:
              f.write("## 🚀 Changes\n")
              for msg, nums in groups.items():
                  nums = [n for n in nums if n]
                  if nums:
                      f.write("- " + msg + " (#" + ", #".join(nums) + ")\n")
                  else:
                      f.write("- " + msg + "\n")
          '

      - name: Create Tag & Release
        if: steps.check_release.outputs.create_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "V${{ env.VERSION }}"
          name: "Release V${{ env.VERSION }}"
          body_path: CHANGELOG.md
          files: |
            module/release/*-release.zip
            module/release/*-debug.zip
            encryptor-app/build/outputs/apk/release/*.apk
